{% load static %}<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>페약얼마</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    /* 개국공신 로그인 UI 구조를 그대로 옮김 (Tailwind → 동일 값 CSS) */
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;   /* min-h-screen flex items-center justify-center */
      padding: 32px;                                                 /* p-8 */
      background: #f9fafb;                                           /* bg-gray-50 */
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      display: flex; flex-direction: column; align-items: center;    /* flex flex-col items-center */
      gap: 40px;                                                     /* gap-10 */
      width: 100%; max-width: 448px;                                 /* w-full max-w-md */
    }
    .brand { text-align: center; }
    .brand h1 {
      margin: 0 0 12px;                                              /* mb-3 */
      font-size: 36px; line-height: 1.1; font-weight: 700;          /* text-4xl font-bold */
      color: #0D0D0D;                                                /* text-app-dark */
      letter-spacing: -0.025em;                                      /* tracking-tight */
    }
    .brand p { margin: 0; font-size: 16px; color: #6b7280; }        /* text-gray-500 */

    .block { width: 100%; display: flex; flex-direction: column; gap: 16px; } /* w-full flex-col gap-4 */

    /* Google 버튼 (보조 로그인 위계) */
    .gbtn {
      display: flex; align-items: center; justify-content: center; gap: 12px;  /* flex items-center justify-center gap-3 */
      width: 100%; padding: 16px 24px;                              /* w-full px-6 py-4 */
      background: #fff; border: 1px solid #e5e7eb;                  /* bg-white border border-gray-200 */
      border-radius: 16px;                                          /* rounded-2xl */
      box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05);                     /* shadow-sm */
      cursor: pointer; transition: background-color .15s;           /* transition-colors */
    }
    .gbtn:hover { background: #f9fafb; }                            /* hover:bg-gray-50 */
    .gbtn:disabled { opacity: .6; cursor: default; }               /* disabled:opacity-60 */
    .gbtn span { font-size: 16px; font-weight: 500; color: #374151; } /* text-base font-medium text-gray-700 */
    .gicon { width: 20px; height: 20px; }                          /* w-5 h-5 */

    /* 안내 문구 */
    .hint { margin: 0; font-size: 14px; color: #6b7280; text-align: center; } /* text-sm text-gray-500 text-center */

    /* 초대코드 입력칸 (중앙정렬 + 대문자 + 넓은 자간) */
    .code-input {
      width: 100%; padding: 12px 16px;
      border: 1px solid #e5e7eb; border-radius: 16px;               /* rounded-2xl */
      font-size: 16px; text-align: center;
      text-transform: uppercase; letter-spacing: 0.25em;           /* tracking-widest uppercase */
      transition: border-color .15s;
    }
    .code-input:focus { outline: none; border-color: #0F7A4C; }    /* focus:border-app-primary */
    .code-input::placeholder { text-transform: none; letter-spacing: normal; color: #9ca3af; } /* placeholder:normal-case */

    /* 주 버튼 (시작하기) — 꽉 찬 위계 */
    .pbtn {
      width: 100%; padding: 16px 24px;
      background: #0F7A4C; color: #fff;                             /* bg-app-primary text-white */
      border: none; border-radius: 16px;                           /* rounded-2xl */
      box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05);
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .pbtn:hover { opacity: .9; }
    .pbtn:disabled { opacity: .6; cursor: default; }

    /* 보조 액션 (다른 계정으로 로그인) — 작은 회색 텍스트 링크 */
    .alt {
      align-self: center; background: none; border: none; padding: 0;
      font-size: 14px; color: #9ca3af; cursor: pointer;            /* text-sm text-gray-400 */
      transition: color .15s;
    }
    .alt:hover { color: #4b5563; }                                 /* hover:text-gray-600 */

    /* 마케팅 링크 프리필 배지 */
    .badge { margin: 0; font-size: 14px; color: #0F7A4C; text-align: center; } /* text-sm text-app-primary */
    .badge b { font-weight: 600; letter-spacing: 0.15em; }

    .err { font-size: 14px; color: #E64D40; text-align: center; }  /* text-app-error text-sm */
    .back {
      display: flex; align-items: center; gap: 6px;                 /* flex items-center gap-1.5 */
      font-size: 14px; color: #9ca3af; text-decoration: none;      /* text-sm text-gray-400 */
      transition: color .15s;
    }
    .back:hover { color: #4b5563; }                                /* hover:text-gray-600 */
    .back svg { width: 16px; height: 16px; }                       /* w-4 h-4 */
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <h1>페약얼마</h1>
      <p>전국 약국 구인공고 기반 약사 시급 리포트</p>
    </div>

    <!-- 기본: Google 로그인 (미인증 · 재방문자). 코드칸을 보이지 않는다. -->
    <div id="google-block" class="block">
      <p id="prefill-badge" class="badge" style="display:none;">
        초대코드 <b id="prefill-code"></b> 적용됨
      </p>
      <button id="login-btn" class="gbtn">
        <svg class="gicon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        <span id="login-btn-text">Google로 시작</span>
      </button>
    </div>

    <!-- 처음 온 유저(로그인됨 + 미부여): 이때만 코드 입력 -->
    <div id="code-block" class="block" style="display:none;">
      <p id="code-hint" class="hint"></p>
      <input id="code-input" class="code-input" type="text" placeholder="초대코드"
             autocapitalize="characters" autocomplete="off" spellcheck="false" />
      <button id="claim-btn" class="pbtn"><span id="claim-btn-text">시작하기</span></button>
      <button id="alt-login" class="alt" type="button">다른 계정으로 로그인</button>
    </div>

    <p id="login-error" class="err" style="display:none;"></p>

    <a class="back" href="https://chajjaem.dev">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5" />
        <path d="M12 19l-7-7 7-7" />
      </svg>
      chajjaem.dev로 돌아가기
    </a>
  </div>

  {% if SUPABASE_URL %}
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const APP_ID = 'gongo';
    const STORAGE_KEY = 'gongo_invite_code';   // 로그인 직전 입력/프리필한 코드 보관
    const sb = supabase.createClient("{{ SUPABASE_URL }}", "{{ SUPABASE_ANON_KEY }}");

    const params = new URLSearchParams(location.search);
    const nextUrl = params.get('next') || '/';

    const googleBlock = document.getElementById('google-block');
    const codeBlock   = document.getElementById('code-block');
    const prefillBadge = document.getElementById('prefill-badge');
    const prefillCode  = document.getElementById('prefill-code');
    const loginBtn     = document.getElementById('login-btn');
    const loginBtnText = document.getElementById('login-btn-text');
    const codeInput    = document.getElementById('code-input');
    const claimBtn     = document.getElementById('claim-btn');
    const claimBtnText = document.getElementById('claim-btn-text');
    const codeHint     = document.getElementById('code-hint');
    const altLogin     = document.getElementById('alt-login');
    const errEl        = document.getElementById('login-error');

    // 마케팅 링크(?code=INSTA2026): 코드를 미리 담아두고 로그인 후 자동 부여.
    const qCode = (params.get('code') || '').trim().toUpperCase();
    if (qCode) localStorage.setItem(STORAGE_KEY, qCode);
    const pendingAtLoad = localStorage.getItem(STORAGE_KEY);
    if (pendingAtLoad) {
      prefillCode.textContent = pendingAtLoad;
      prefillBadge.style.display = '';
    }

    function persist(session) {
      if (!session) return false;
      document.cookie = "sb-access-token=" + session.access_token +
        "; path=/; max-age=" + (session.expires_in || 3600) + "; samesite=lax; secure";
      return true;
    }
    function showError(msg) { errEl.textContent = msg; errEl.style.display = ''; }
    function clearError() { errEl.style.display = 'none'; }
    function setLoading(on) {
      loginBtn.disabled = on; claimBtn.disabled = on; altLogin.disabled = on;
      loginBtnText.textContent = on ? '로그인 중...' : 'Google로 시작';
      claimBtnText.textContent = on ? '확인 중...' : '시작하기';
    }
    function showCodeInput(email) {
      googleBlock.style.display = 'none';
      codeBlock.style.display = '';
      codeHint.textContent = (email || '') + '님, 초대코드를 입력하면 시작할 수 있어요.';
      codeInput.focus();
    }

    // 초대코드 부여 요청(RPC). 성공 시 목적지로 이동. silent=true면 자동 시도(에러 숨김).
    async function claim(rawCode, silent) {
      const code = (rawCode || '').trim().toUpperCase();
      if (!code) { if (!silent) showError('초대코드를 입력해주세요'); return false; }
      setLoading(true); clearError();
      try {
        const { data, error } = await sb.rpc('claim_invite', { p_code: code, p_app: APP_ID });
        if (error) throw error;
        if (data && data.granted) {
          localStorage.removeItem(STORAGE_KEY);
          location.replace(nextUrl);
          return true;
        }
        if (!silent) showError('유효하지 않은 초대코드입니다');
        return false;
      } catch (e) {
        if (!silent) showError('초대코드 확인에 실패했어요. 다시 시도해 주세요.');
        return false;
      } finally {
        setLoading(false);
      }
    }

    // 로그인된 세션의 접근 권한 확인 → 라우팅.
    // 부여됨: 목적지로. 미부여: 저장된 코드로 자동 부여 시도, 실패 시 코드 입력 UI.
    async function routeBySession(session) {
      if (!persist(session)) return;
      let granted = false;
      try {
        const { data } = await sb.from('users')
          .select('invite_code').eq('id', session.user.id).maybeSingle();
        granted = !!(data && data.invite_code);
      } catch (e) { /* 조회 실패 시 미부여로 취급 → 코드 입력 유도 */ }

      if (granted) { location.replace(nextUrl); return; }

      const pending = localStorage.getItem(STORAGE_KEY);
      if (pending && await claim(pending, true)) return;   // 자동 부여 성공 시 이미 이동

      showCodeInput(session.user.email);
    }

    // OAuth 리다이렉트 복귀 또는 기존 세션 처리
    sb.auth.getSession().then(function (res) {
      if (res.data.session) routeBySession(res.data.session);
    });
    sb.auth.onAuthStateChange(function (_e, session) {
      if (session) routeBySession(session);
    });

    loginBtn.onclick = async function () {
      clearError(); setLoading(true);
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: location.origin + '/login/?next=' + encodeURIComponent(nextUrl) },
      });
      if (error) { setLoading(false); showError('로그인에 실패했어요. 다시 시도해 주세요.'); }
    };

    claimBtn.onclick = function () { claim(codeInput.value, false); };
    codeInput.addEventListener('keyup', function (e) { if (e.key === 'Enter') claim(codeInput.value, false); });
    altLogin.onclick = function () { location.href = '/logout/'; };
  </script>
  {% else %}
  <script>
    document.getElementById('login-btn').disabled = true;
    var e = document.getElementById('login-error');
    e.textContent = '인증이 아직 설정되지 않았습니다 (SUPABASE_URL 없음).';
    e.style.display = '';
  </script>
  {% endif %}
</body>
</html>
